<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PWB Yönetim Paneli</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <div>
        <p>PWB Peanut Waffle</p>
        <h1>Yönetim Paneli</h1>
      </div>
      <a href="index.html">Siteyi Görüntüle</a>
    </header>

    <main>
      <form id="admin-form">
        <section class="panel">
          <div class="panel-heading">
            <span>01</span>
            <div>
              <h2>Ana Sayfa</h2>
              <p>Hero alanı ve menü başlığını düzenle.</p>
            </div>
          </div>
          <div class="form-grid">
            <label>
              Üst kısa metin
              <input name="heroEyebrow" type="text" />
            </label>
            <label>
              Ana başlık
              <input name="heroTitle" type="text" />
            </label>
            <label class="full">
              Ana açıklama
              <textarea name="heroCopy" rows="3"></textarea>
            </label>
            <label>
              Menü başlığı
              <input name="menuTitle" type="text" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <span>02</span>
            <div>
              <h2>Mağaza Bilgileri</h2>
              <p>Konum, çalışma saati ve mağaza metinleri.</p>
            </div>
          </div>
          <div class="form-grid">
            <label>
              Mağaza başlığı
              <input name="venueTitle" type="text" />
            </label>
            <label>
              Çalışma saatleri
              <input name="hours" type="text" />
            </label>
            <label>
              Kısa konum
              <input name="location" type="text" />
            </label>
            <label>
              Şehir
              <input name="city" type="text" />
            </label>
            <label class="full">
              Açık adres
              <input name="address" type="text" />
            </label>
            <label class="full">
              Mağaza açıklaması
              <textarea name="venueDescription" rows="3"></textarea>
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <span>03</span>
            <div>
              <h2>Ürünler</h2>
              <p>Ürün ekle, görsel yükle, sırala veya yayından kaldır.</p>
            </div>
            <button class="add-product" id="add-product" type="button">+ Yeni Ürün Ekle</button>
          </div>
          <div class="products-editor" id="products-editor"></div>
        </section>

        <div class="admin-actions">
          <button class="secondary" id="reset-button" type="button">Varsayılana Dön</button>
          <span id="save-status" role="status"></span>
          <button class="primary" type="submit">Değişiklikleri Kaydet</button>
        </div>
      </form>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
